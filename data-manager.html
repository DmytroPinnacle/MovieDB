<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Management - MovieDB</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .data-manager {
      max-width: 800px;
      margin: 2rem auto;
      padding: 2rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .section {
      margin-bottom: 2rem;
      padding: 1.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .section h2 {
      margin-top: 0;
      color: #333;
      font-size: 1.5rem;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin: 1rem 0;
    }
    .stat-card {
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 4px;
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: #007bff;
    }
    .stat-label {
      font-size: 0.875rem;
      color: #666;
      margin-top: 0.5rem;
    }
    .button-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.2s;
    }
    .btn-primary {
      background-color: #007bff;
      color: white;
    }
    .btn-primary:hover {
      background-color: #0056b3;
    }
    .btn-secondary {
      background-color: #6c757d;
      color: white;
    }
    .btn-secondary:hover {
      background-color: #545b62;
    }
    .btn-danger {
      background-color: #dc3545;
      color: white;
    }
    .btn-danger:hover {
      background-color: #c82333;
    }
    .file-input {
      display: none;
    }
    .message {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 4px;
      display: none;
    }
    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .message.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="data-manager">
    <h1>MovieDB Data Management</h1>
    
    <!-- Statistics Section -->
    <div class="section">
      <h2>Current Data Statistics</h2>
      <div class="stats" id="stats">
        <div class="stat-card">
          <div class="stat-value" id="movieCount">0</div>
          <div class="stat-label">Movies</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="watcherCount">0</div>
          <div class="stat-label">Watchers</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="sessionCount">0</div>
          <div class="stat-label">Sessions</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="favoriteCount">0</div>
          <div class="stat-label">Favorites</div>
        </div>
      </div>
    </div>

    <!-- Seed Data Section -->
    <div class="section">
      <h2>Initialize Seed Data</h2>
      <p>Load sample data (100 movies, 7 watchers, and sessions) for testing.</p>
      <div class="button-group">
        <button class="btn btn-primary" id="seedBtn">
          🌱 Load Seed Data
        </button>
      </div>
    </div>

    <!-- Message Area -->
    <div id="message" class="message"></div>
  </div>

  <script type="module">
    import { dataManager } from './js/dal/DataManager.js';
    import { initializeSeedData } from './js/DataSeed/initializer.js';

    function updateStats() {
      const stats = dataManager.getStats();
      document.getElementById('movieCount').textContent = stats.movies;
      document.getElementById('watcherCount').textContent = stats.watchers;
      document.getElementById('sessionCount').textContent = stats.sessions;
      document.getElementById('favoriteCount').textContent = stats.favorites;
    }

    function showMessage(text, type = 'success') {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.className = `message ${type} show`;
      setTimeout(() => {
        messageEl.classList.remove('show');
      }, 5000);
    }

    // Seed data
    document.getElementById('seedBtn').addEventListener('click', async () => {
      if (!confirm('Are you sure you want to load seed data? This may add duplicates or reset data depending on configuration.')) {
        return;
      }
      try {
        await initializeSeedData();
        updateStats();
        showMessage('Seed data loaded successfully!', 'success');
      } catch (err) {
        showMessage('Seeding failed: ' + err.message, 'error');
      }
    });

    // Initialize
    (async function() {
        try {
            await dataManager.initialize();
            updateStats();
        } catch (error) {
            console.error('Failed to initialize data:', error);
            showMessage('Failed to load current data statistics', 'error');
        }
    })();
  </script>
</body>
</html>
