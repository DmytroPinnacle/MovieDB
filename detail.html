<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Details - MovieDB</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/detail.css" />
</head>
<body>
  <header class="app-header">
    <h1>🎬 MovieDB</h1>
    <div class="toolbar">
      <a href="index.html" class="btn-back">← Back to List</a>
    </div>
  </header>
  <main class="detail-layout">
    <div id="movieDetail" class="detail-container">
      <!-- Content will be populated by JavaScript -->
    </div>
    <div id="notFound" class="not-found hidden">
      <h2>Movie Not Found</h2>
      <p>The movie you're looking for doesn't exist or may have been deleted.</p>
      <a href="index.html" class="primary">Return to Movie List</a>
    </div>
  </main>
  <footer class="app-footer">Movie DB demo • Data stored locally in your browser</footer>
  <script type="module" src="js/detail.js"></script>
</body>
</html>
