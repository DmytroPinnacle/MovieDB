<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MovieDB</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>🎬 MovieDB</h1>
    <div class="toolbar">
      <input id="searchInput" type="search" placeholder="Search by title..." aria-label="Search movies by title" />
      <select id="filterGenre" aria-label="Filter by genre">
        <option value="">All Genres</option>
      </select>
      <select id="sortSelect" aria-label="Sort movies">
        <option value="title-asc">Title A→Z</option>
        <option value="title-desc">Title Z→A</option>
        <option value="year-desc">Year ↓</option>
        <option value="year-asc">Year ↑</option>
        <option value="rating-desc">Rating ↓</option>
        <option value="rating-asc">Rating ↑</option>
      </select>
      <button id="addMovieBtn" class="primary">Add Movie</button>
    </div>
  </header>
  <main class="layout">
    <section class="panel" aria-labelledby="formTitle">
      <h2 id="formTitle">Add Movie</h2>
      <form id="movieForm" novalidate>
        <!-- Hidden field needs a name attribute to be included in FormData for edits -->
        <input type="hidden" id="movieId" name="movieId" />
        <div class="field">
          <label for="title">Title</label>
          <input id="title" name="title" required maxlength="120" />
          <small class="error" data-error-for="title"></small>
        </div>
        <div class="field">
          <label for="year">Year</label>
            <input id="year" name="year" type="number" min="1888" max="2100" required />
            <small class="error" data-error-for="year"></small>
        </div>
        <div class="field">
          <label for="genre">Genre</label>
          <input id="genre" name="genre" list="genreList" required />
          <datalist id="genreList">
            <option>Action</option>
            <option>Comedy</option>
            <option>Drama</option>
            <option>Sci-Fi</option>
            <option>Horror</option>
            <option>Fantasy</option>
            <option>Romance</option>
            <option>Thriller</option>
            <option>Documentary</option>
          </datalist>
          <small class="error" data-error-for="genre"></small>
        </div>
        <div class="field">
          <label for="rating">Rating (0-10)</label>
          <input id="rating" name="rating" type="number" min="0" max="10" step="0.1" />
          <small class="error" data-error-for="rating"></small>
        </div>
        <div class="field">
          <label for="posterUrl">Poster URL</label>
          <input id="posterUrl" name="posterUrl" type="url" placeholder="https://..." />
          <small class="error" data-error-for="posterUrl"></small>
        </div>
        <div class="field">
          <label for="imdbId">IMDB ID</label>
          <input id="imdbId" name="imdbId" placeholder="tt1234567" pattern="tt\d{7,8}" />
          <small class="error" data-error-for="imdbId"></small>
          <small class="help">Format: tt followed by 7-8 digits (e.g., tt0111161)</small>
        </div>
        <div class="field">
          <label for="watcherIds">Watchers</label>
          <div class="watcher-controls">
            <div id="watcherCheckboxes" class="watcher-checkboxes">
              <!-- Populated by JavaScript -->
            </div>
            <button type="button" id="manageWatchersBtn" class="small secondary">Manage Watchers</button>
          </div>
          <small class="error" data-error-for="watcherIds"></small>
        </div>
        <div class="field">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="3" maxlength="500"></textarea>
          <small class="help">Short personal notes (max 500 chars)</small>
        </div>
        <div class="actions">
          <button type="submit" class="primary" id="saveBtn">Save</button>
          <button type="reset" id="resetBtn">Reset</button>
          <button type="button" id="cancelEditBtn" class="secondary hidden">Cancel Edit</button>
        </div>
      </form>
    </section>
    <section class="panel" aria-labelledby="listTitle">
      <h2 id="listTitle">Movies</h2>
      <ul id="movieList" class="movie-list" aria-live="polite"></ul>
      <p id="emptyState" class="empty">No movies yet. Add your first!</p>
    </section>
  </main>
  <template id="movieItemTemplate">
    <li class="movie-item" data-id="">
      <div class="poster-wrapper">
        <img class="poster" alt="Poster" />
      </div>
      <div class="info">
        <h3 class="title"><a class="title-link" href="#"></a></h3>
        <p class="meta"></p>
        <p class="watchers-section"></p>
        <div class="item-actions">
          <button class="small danger delete-btn" aria-label="Delete movie">Delete</button>
          <a class="small imdb-link hidden" target="_blank" rel="noopener" aria-label="View on IMDB">IMDB</a>
        </div>
      </div>
    </li>
  </template>
  
  <!-- Watcher Management Modal -->
  <div id="watcherModal" class="modal hidden">
    <div class="modal-content">
      <header class="modal-header">
        <h2>Manage Watchers</h2>
        <button type="button" class="modal-close" aria-label="Close">&times;</button>
      </header>
      <div class="modal-body">
        <form id="watcherForm" novalidate>
          <input type="hidden" id="watcherEditId" name="watcherEditId" />
          <div class="field">
            <label for="watcherFirstName">First Name</label>
            <input id="watcherFirstName" name="firstName" required maxlength="50" />
            <small class="error" data-error-for="firstName"></small>
          </div>
          <div class="field">
            <label for="watcherLastName">Last Name (optional)</label>
            <input id="watcherLastName" name="lastName" maxlength="50" />
            <small class="error" data-error-for="lastName"></small>
          </div>
          <div class="actions">
            <button type="submit" class="primary" id="saveWatcherBtn">Add Watcher</button>
            <button type="reset" id="resetWatcherBtn">Reset</button>
            <button type="button" id="cancelWatcherEditBtn" class="secondary hidden">Cancel Edit</button>
          </div>
        </form>
        <hr />
        <h3>Existing Watchers</h3>
        <ul id="watcherList" class="watcher-list"></ul>
        <p id="watcherEmptyState" class="empty">No watchers yet. Add your first!</p>
      </div>
    </div>
  </div>
  
  <template id="watcherItemTemplate">
    <li class="watcher-item" data-id="">
      <span class="watcher-name"></span>
      <div class="watcher-actions">
        <button class="small edit-watcher-btn" aria-label="Edit watcher">Edit</button>
        <button class="small danger delete-watcher-btn" aria-label="Delete watcher">Delete</button>
      </div>
    </li>
  </template>
  
  <footer class="app-footer">Movie DB demo • Data stored locally in your browser</footer>
  <!-- Use a single ES module entrypoint; it will import other modules -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
